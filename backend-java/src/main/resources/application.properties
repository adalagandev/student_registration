# application.properties — Spring Boot's central configuration file.
# Every line here tweaks a framework default. This is the Java analogue of the
# handful of app.config[...] / app.run(...) settings scattered through app.py.

# ---------------------------------------------------------------------------
# Web server
# ---------------------------------------------------------------------------
# Serve on port 5000, matching the hardcoded BASE_URL in frontend/src/api.js.
server.port=5000

# ---------------------------------------------------------------------------
# Database (SQLite) — reuse the EXISTING file the Python backend created.
# ---------------------------------------------------------------------------
# The path is relative to the working directory Maven runs from (backend-java/),
# so ../backend/students.db points at the very same file app.py uses. Data and
# uploaded documents therefore carry over transparently.
spring.datasource.url=jdbc:sqlite:../backend/students.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite allows only ONE writer at a time. A larger pool just produces
# "database is locked" (SQLITE_BUSY) errors under concurrent writes, so we cap
# the HikariCP pool at a single connection — plenty for this small app.
spring.datasource.hikari.maximum-pool-size=1

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
# Teach Hibernate to speak SQLite (see the community-dialects dependency).
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# ddl-auto=update replaces app.py's init_db() migration path: on startup Hibernate
# inspects the schema and CREATEs any missing table / ADDs any missing column,
# leaving existing data alone. The current students.db already has every column
# (phone, registered_at, original_name), so this is effectively a no-op for it,
# and it also bootstraps a brand-new empty database.
spring.jpa.hibernate.ddl-auto=update

# Log the SQL Hibernate generates — handy while porting; harmless to leave on in dev.
spring.jpa.show-sql=true

# ---------------------------------------------------------------------------
# File uploads (program-change PDFs)
# ---------------------------------------------------------------------------
# IMPORTANT: do NOT cap max-file-size at 25 MB here. Flask enforces the per-file
# 25 MB rule in application code and returns a 400 with a specific message; the
# servlet-level limit instead yields a 413. To preserve Flask's behaviour we set
# BOTH limits to 55 MB (the whole-request cap) and check each file's size
# ourselves in ProgramChangeService. A body over 55 MB trips this limit and
# surfaces as a 413, exactly like Flask's MAX_CONTENT_LENGTH.
spring.servlet.multipart.max-file-size=55MB
spring.servlet.multipart.max-request-size=55MB

# ---------------------------------------------------------------------------
# Application-specific settings (read via @Value in our own code)
# ---------------------------------------------------------------------------
# Where uploaded PDFs live: the same uploads/ folder the Python backend uses.
app.upload-dir=../backend/uploads
# The frontend origin allowed through CORS (Vite dev server).
app.frontend-origin=http://localhost:5173
